<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowix Popup</title>
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <img id="logoImg" class="flowix-logo" alt="Flowix logo" />
      </header>

      <section class="card" id="statusPanel">
        <p id="statusRecording">Recording: OFF</p>
        <p id="statusToken">Session: missing</p>
        <p id="statusFlow">Current flow: none</p>
      </section>

      <section class="card">
        <label for="projectSelect">Project</label>
        <select id="projectSelect"></select>
        <p class="hint">Open <a href="https://www.flowrecorder.pro" target="_blank">flowrecorder.pro</a> in a tab, log in, then click <strong>Sync</strong> to connect the extension to your account and load your projects.</p>
      </section>

      <section class="actions">
        <button id="syncBtn" type="button" class="secondary">Sync</button>
        <button id="startBtn" type="button" class="primary">Start</button>
        <button id="stopBtn" type="button" class="secondary">Stop</button>
      </section>

      <section class="shortcut-row">
        <p class="shortcut-label">Capture now</p>
        <button id="captureShortcutBtn" type="button" class="secondary shortcut-btn">Alt+Shift+C</button>
      </section>

      <section class="actions" id="flowActions" hidden>
        <button id="openFlowBtn" type="button" class="secondary">Open flow</button>
        <button id="copyFlowBtn" type="button" class="secondary">Copy link</button>
      </section>

      <p id="message" class="message"></p>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>

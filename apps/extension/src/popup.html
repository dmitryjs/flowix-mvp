<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowix Popup</title>
  </head>
  <body>
    <main>
      <h1>Flowix</h1>
      <div id="statusPanel">
        <p id="statusRecording">Recording: OFF</p>
        <p id="statusProject">Project ID: missing</p>
        <p id="statusToken">Token: missing</p>
        <p id="statusFlow">Current flow: none</p>
        <p id="statusStep">Next step index: 0</p>
      </div>
      <label for="projectIdInput">Project ID</label>
      <input id="projectIdInput" type="text" placeholder="project id" />
      <label for="accessTokenInput">Access Token</label>
      <textarea id="accessTokenInput" rows="3" placeholder="paste access token"></textarea>
      <div class="actions">
        <button id="startBtn" type="button">Start</button>
        <button id="stopBtn" type="button">Stop</button>
        <button id="captureBtn" type="button">Capture</button>
      </div>
      <p id="message"></p>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
